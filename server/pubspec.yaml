name: server
description: A server app using the shelf package and Docker.
version: 1.0.0

publish_to: none

environment:
  sdk: ^3.11.0

dependencies:
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  http: ^1.6.0
  unsplash_client: ^3.0.0
  equatable: ^2.0.8
  json_annotation: ^4.11.0
  shared:
    path: ../shared
  pexels:
    path: ../packages/pexels
  dotenv: ^4.2.0
  http_interceptor: ^2.0.0
  collection: ^1.19.1
  intl: ^0.20.2
  screwdriver: ^5.12.0

dev_dependencies:
  lints: ^6.1.0
  test: ^1.30.0
  build_runner: ^2.12.2
  json_serializable: ^6.13.0
