name: pluto
description: A beautiful new tab for your browser built with love in Flutter.

publish_to: 'none'

version: 0.6.4

environment:
  sdk: ^3.11.0
  flutter: ^3.38.0

dependencies:
  flutter:
    sdk: flutter
  equatable: ^2.0.8
  shared_preferences: ^2.5.4
  provider: ^6.1.5+1
  get_it: ^9.2.1
  json_annotation: ^4.11.0
  collection: ^1.19.1
  intl: ^0.20.2
  http: ^1.6.0
  #  dropdown_button2: ^1.9.2
  file_picker: ^10.3.10
  screwdriver: ^5.12.0
  flutter_multi_formatter: ^2.13.10
  url_launcher: ^6.3.2
  package_info_plus: ^9.0.0
  flutter_screwdriver: ^3.3.1
  flutter_markdown: ^0.7.7+1
  mobx: ^2.6.0
  flutter_mobx: ^2.3.0
  rxdart: ^0.28.0
  universal_io: ^2.3.1
  unsplash_client: ^3.0.0
  shared:
    path: shared
  pexels:
    path: packages/pexels
  ticking_widget: ^1.0.0
  universal_web: ^1.1.1+1
  http_interceptor: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.12.2
  flutter_lints: ^6.0.0
  characters: ^1.4.1
  dart_style: ^3.1.3
  json_serializable: ^6.13.0
  flutter_launcher_icons: ^0.14.4
  yaml: ^3.1.3
  mobx_codegen: ^2.7.6

dependency_overrides:
  watcher: ^1.2.1

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/images/

  fonts:
    - family: Product
      fonts:
        - asset: assets/fonts/Product.ttf
    - family: Cardo
      fonts:
        - asset: assets/fonts/Cardo-Regular.ttf
    - family: Cardo Italics
      fonts:
        - asset: assets/fonts/Cardo-Italics.ttf
    - family: Jakarta Sans
      fonts:
        - asset: assets/fonts/JakartaSans-Regular.ttf
        - asset: assets/fonts/JakartaSans-Medium.ttf
          weight: 500
    - family: Renner
      fonts:
        - asset: assets/fonts/Renner-Medium.otf

scripts: scripts.yaml